<?xml version="1.0" encoding="UTF-8" standalone="no"?>

<svg
    xmlns="http://www.w3.org/2000/svg"
    width="210mm"
    height="297mm"
    viewBox="0 0 210 297">

    <title>D&D 5e Character Sheet - Page 1</title>

    <desc>
        Premium Character Sheet
        Version 0.1
    </desc>

    <defs>

        <style>

            .title{
                font-family:Cinzel;
                font-size:5px;
                font-weight:bold;
            }

            .subtitle{
                font-family:EB Garamond;
                font-size:3.2px;
            }

            .label{
                font-family:EB Garamond;
                font-size:3px;
            }

            .small{
                font-family:EB Garamond;
                font-size:2.5px;
            }

            .box{
                fill:none;
                stroke:#222;
                stroke-width:0.35;
            }

            .line{
                stroke:#444;
                stroke-width:0.25;
            }

            .light{
                stroke:#888;
                stroke-width:0.15;
            }

        </style>

    </defs>

    <!-- ====================================================== -->
    <!-- Background                                              -->
    <!-- ====================================================== -->

    <g id="background">

        <rect
            x="0"
            y="0"
            width="210"
            height="297"
            fill="white"/>

    </g>

    <!-- ====================================================== -->
    <!-- Safe Margin                                             -->
    <!-- ====================================================== -->

    <g id="safe-area">

        <rect
            class="light"
            x="10"
            y="10"
            width="190"
            height="277"
            fill="none"/>

    </g>

    <!-- ====================================================== -->
    <!-- Development Grid                                        -->
    <!-- Remove before release                                   -->
    <!-- ====================================================== -->

    <g id="grid">

        <!-- Vertical -->

        <line class="light" x1="57.5" y1="10" x2="57.5" y2="287"/>

        <line class="light" x1="142.5" y1="10" x2="142.5" y2="287"/>

        <!-- Horizontal -->

        <line class="light" x1="10" y1="52" x2="200" y2="52"/>

        <line class="light" x1="10" y1="128" x2="200" y2="128"/>

        <line class="light" x1="10" y1="208" x2="200" y2="208"/>

    </g>

    <!-- ====================================================== -->
    <!-- Header                                                  -->
    <!-- ====================================================== -->

    <g id="header">

    </g>

    <!-- ====================================================== -->
    <!-- Attributes                                              -->
    <!-- ====================================================== -->

    <g id="attributes">

    </g>

    <!-- ====================================================== -->
    <!-- Combat                                                  -->
    <!-- ====================================================== -->

    <g id="combat">

    </g>

    <!-- ====================================================== -->
    <!-- Summary                                                 -->
    <!-- ====================================================== -->

    <g id="summary">

    </g>

    <!-- ====================================================== -->
    <!-- Attacks                                                 -->
    <!-- ====================================================== -->

    <g id="attacks">

    </g>

    <!-- ====================================================== -->
    <!-- Equipment                                               -->
    <!-- ====================================================== -->

    <g id="equipment">

    </g>

    <!-- ====================================================== -->
    <!-- Treasure                                                -->
    <!-- ====================================================== -->

    <g id="treasure">

    </g>

    <!-- ====================================================== -->
    <!-- Resources                                               -->
    <!-- ====================================================== -->

    <g id="resources">

    </g>

</svg>
